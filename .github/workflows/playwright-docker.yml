name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Trigger nightly at 8:00 UTC corresponds to 1:00 AM (Pacific Daylight Time).
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      browser:
        type: choice
        description: Which tests to run
        required: true
        options:
          - chromium-only
          - all
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout  
      uses: actions/checkout@v5
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Verify Docker Compose (optional, for debugging)
      run: |
        docker --version
        docker compose version # Verify 'docker compose' version 
    - name: Show local time (for reference)
      run: |
        echo "Current time in UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "Current time in PDT: $(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M:%S PDT')"       
    - name: Determine Playwright Test Name
      id: set_test_name
      run: |
        # 1. Check the event name
        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          echo "TEST_NAME=all" >> $GITHUB_ENV
          echo "Nightly schedule detected: Running all tests." 
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "TEST_NAME=${{ github.event.inputs.browser }}" >> $GITHUB_ENV
          echo "Manual trigger detected: Running ${{ github.event.inputs.browser }} suite."  
        else 
          echo "TEST_NAME=chromium-only" >> $GITHUB_ENV 
          echo "Push event detected: Running chromium-only smoke test."
        fi              
    - name: Build and run Docker Compose
      run: |
        docker compose up --build --abort-on-container-exit
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 15